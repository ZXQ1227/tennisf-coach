<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>AI 教练 · TennisF</title>
<style>
  :root {
    --bg: #0A1810; --bg2: #0F2016;
    --green: #A6FF33; --green-dim: rgba(166,255,51,0.12); --green-border: rgba(166,255,51,0.28);
    --text: #FFFFFF; --text-dim: rgba(255,255,255,0.55); --text-faint: rgba(255,255,255,0.28);
    --card: rgba(255,255,255,0.05); --card-border: rgba(255,255,255,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, 'PingFang SC', sans-serif; }
  body { display: flex; flex-direction: column; }

  .hd {
    flex-shrink: 0; background: var(--bg2); border-bottom: 1px solid var(--card-border);
    padding: 16px 20px 14px; display: flex; align-items: center; gap: 14px;
  }
  .hd-logo { font-size: 22px; }
  .hd-title { font-size: 17px; font-weight: 700; }
  .hd-sub { font-size: 12px; color: var(--text-dim); margin-top: 1px; }
  .hd-badge {
    margin-left: auto; background: var(--green-dim); border: 1px solid var(--green-border);
    color: var(--green); font-size: 11px; font-weight: 700;
    padding: 4px 10px; border-radius: 100px;
  }

  .player-card {
    flex-shrink: 0; margin: 12px 16px; background: var(--card);
    border: 1px solid var(--card-border); border-radius: 16px;
    padding: 14px 16px; display: flex; align-items: center; gap: 12px;
  }
  .player-card.hidden { display: none; }
  .av {
    width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; color: #fff; background: #2BB673;
  }
  .av img { width: 100%; height: 100%; object-fit: cover; }
  .player-name { font-size: 15px; font-weight: 700; }
  .player-meta { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .player-strengths { font-size: 11px; color: var(--text-faint); margin-top: 3px; }

  .msgs {
    flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 8px 16px 12px; display: flex; flex-direction: column; gap: 12px;
  }
  .msg { display: flex; gap: 10px; animation: fadeUp 0.22s ease-out; }
  .msg-ai { align-items: flex-start; }
  .msg-user { flex-direction: row-reverse; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; } }

  .msg-av {
    width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; margin-top: 2px;
    display: flex; align-items: center; justify-content: center; font-size: 16px;
    background: var(--green-dim); border: 1px solid var(--green-border);
  }
  .msg-bubble {
    max-width: 78%; padding: 10px 14px; border-radius: 16px;
    font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word;
  }
  .msg-ai .msg-bubble {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10);
    border-top-left-radius: 4px; color: rgba(255,255,255,0.88);
  }
  .msg-user .msg-bubble {
    background: var(--green-dim); border: 1px solid var(--green-border);
    border-top-right-radius: 4px;
  }
  .typing-dots { display: flex; gap: 5px; padding: 4px 2px; }
  .typing-dots span {
    width: 7px; height: 7px; border-radius: 50%; background: var(--green);
    animation: blink 1.2s ease-in-out infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100% { opacity:0.2; } 40% { opacity:1; } }

  .quick-wrap {
    flex-shrink: 0; padding: 0 16px 8px; display: flex; gap: 8px;
    overflow-x: auto; scrollbar-width: none;
  }
  .quick-wrap::-webkit-scrollbar { display: none; }
  .quick-chip {
    flex-shrink: 0; background: var(--card); border: 1px solid var(--card-border);
    color: var(--text-dim); font-size: 12px; padding: 6px 12px;
    border-radius: 100px; cursor: pointer; white-space: nowrap;
  }
  .quick-chip:active { border-color: var(--green-border); color: var(--green); }

  .input-bar {
    flex-shrink: 0; background: var(--bg2); border-top: 1px solid var(--card-border);
    padding: 10px 16px; padding-bottom: calc(10px + env(safe-area-inset-bottom));
    display: flex; gap: 10px; align-items: flex-end;
  }
  .input-ta {
    flex: 1; background: var(--card); border: 1px solid var(--card-border);
    border-radius: 20px; padding: 10px 14px; font-size: 14px; color: var(--text);
    outline: none; resize: none; min-height: 40px; max-height: 120px;
    line-height: 1.5; font-family: inherit;
  }
  .input-ta::placeholder { color: var(--text-faint); }
  .input-ta:focus { border-color: var(--green-border); }
  .send-btn {
    width: 40px; height: 40px; border-radius: 50%; background: var(--green);
    border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0;
  }
  .send-btn:disabled { opacity: 0.35; cursor: default; }
  .send-btn svg { width: 18px; height: 18px; }

  .screen {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px; padding: 32px; text-align: center;
  }
  .screen.hidden { display: none; }
  .screen-icon { font-size: 48px; }
  .screen-title { font-size: 18px; font-weight: 700; }
  .screen-sub { font-size: 14px; color: var(--text-dim); line-height: 1.6; }
  .loader {
    width: 36px; height: 36px; border: 3px solid var(--card-border);
    border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="screen hidden" id="screenErr">
  <div class="screen-icon">🎾</div>
  <div class="screen-title" id="errTitle">链接无效</div>
  <div class="screen-sub" id="errSub">请在 TennisF 小程序重新获取 AI 教练链接</div>
</div>

<div id="mainUI" style="display:none;flex-direction:column;height:100%;">
  <div class="hd">
    <div class="hd-logo">🎾</div>
    <div>
      <div class="hd-title">AI 教练</div>
      <div class="hd-sub">TennisF · 专属指导</div>
    </div>
    <div class="hd-badge">AI</div>
  </div>

  <div class="player-card hidden" id="playerCard">
    <div class="av" id="playerAv"></div>
    <div>
      <div class="player-name" id="playerName"></div>
      <div class="player-meta" id="playerMeta"></div>
      <div class="player-strengths" id="playerStrengths"></div>
    </div>
  </div>

  <div class="msgs" id="msgs"></div>

  <div class="quick-wrap" id="quickWrap">
    <div class="quick-chip" onclick="quickSend(this)">如何提高发球速度？</div>
    <div class="quick-chip" onclick="quickSend(this)">反手稳定性差怎么练？</div>
    <div class="quick-chip" onclick="quickSend(this)">上旋球动作要领</div>
    <div class="quick-chip" onclick="quickSend(this)">打完球膝盖酸痛怎么办？</div>
    <div class="quick-chip" onclick="quickSend(this)">本周训练计划</div>
  </div>

  <div class="input-bar">
    <textarea class="input-ta" id="inputTa" placeholder="问教练…" rows="1"
      oninput="autoResize(this)" onkeydown="onEnter(event)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMsg()" disabled>
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M22 2L11 13" stroke="#0B1A10" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="#0B1A10" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
</div>

<script>
var COACH_API = 'https://1439672136-ef73i3alve.ap-shanghai.tencentscf.com'

var AV_COLORS = ['#2BB673','#4ECDC4','#F7B731','#A29BFE','#FF6B6B']
var LEVEL_LABEL = { beginner:'新手 2.0-2.5', intermediate:'进阶 3.0-3.5', advanced:'竞技 4.0+' }
var STATE = { player: null, history: [], thinking: false }

window.onload = function() {
  var raw = new URLSearchParams(location.search).get('p')
  if (!raw) { showErr('链接无效', '请在 TennisF 小程序重新获取 AI 教练链接'); return }
  try {
    STATE.player = JSON.parse(decodeURIComponent(raw))
  } catch(e) {
    showErr('链接解析失败', '请在 TennisF 小程序重新获取 AI 教练链接'); return
  }
  bootUI()
}

function bootUI() {
  document.getElementById('mainUI').style.display = 'flex'
  var p = STATE.player

  if (p && p.nickname) {
    document.getElementById('playerCard').classList.remove('hidden')
    var avEl = document.getElementById('playerAv')
    if (p.avatarUrl) {
      avEl.innerHTML = '<img src="' + esc(p.avatarUrl) + '" alt="">'
    } else {
      avEl.style.background = avColor(p.nickname)
      avEl.textContent = p.nickname.slice(-1)
    }
    document.getElementById('playerName').textContent = p.nickname
    var meta = [LEVEL_LABEL[p.level] || p.ntrpLevel, p.playStyle].filter(Boolean).join(' · ')
    document.getElementById('playerMeta').textContent = meta
    var sw = (p.strengths || []).slice(0, 3).join(' / ')
    document.getElementById('playerStrengths').textContent = sw ? '强项：' + sw : ''

    if (p.weaknesses && p.weaknesses.length) {
      var chip = document.createElement('div')
      chip.className = 'quick-chip'
      chip.setAttribute('onclick', 'quickSend(this)')
      chip.textContent = '如何改善' + p.weaknesses[0] + '？'
      var qw = document.getElementById('quickWrap')
      qw.insertBefore(chip, qw.firstChild)
    }
  }

  addMsg('ai', '你好！我是你的 AI 网球教练。' +
    (p && p.nickname ? '已加载你的球员档案，可以直接问我针对你的训练建议。' : '有什么网球问题尽管问我。'))

  document.getElementById('inputTa').addEventListener('input', function() {
    document.getElementById('sendBtn').disabled = !this.value.trim()
  })
}

function addMsg(role, text) {
  var msgs = document.getElementById('msgs')
  var wrap = document.createElement('div')
  wrap.className = 'msg msg-' + role
  if (role === 'ai') {
    var av = document.createElement('div')
    av.className = 'msg-av'; av.textContent = '🤖'
    wrap.appendChild(av)
  }
  var bubble = document.createElement('div')
  bubble.className = 'msg-bubble'; bubble.textContent = text
  wrap.appendChild(bubble); msgs.appendChild(wrap)
  msgs.scrollTop = msgs.scrollHeight
}

function addTyping() {
  var msgs = document.getElementById('msgs')
  var wrap = document.createElement('div')
  wrap.className = 'msg msg-ai'; wrap.id = 'typingWrap'
  var av = document.createElement('div'); av.className = 'msg-av'; av.textContent = '🤖'
  var bubble = document.createElement('div'); bubble.className = 'msg-bubble'
  bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>'
  wrap.appendChild(av); wrap.appendChild(bubble); msgs.appendChild(wrap)
  msgs.scrollTop = msgs.scrollHeight
}

function removeTyping() { var el = document.getElementById('typingWrap'); if (el) el.remove() }

function sendMsg() {
  var ta = document.getElementById('inputTa')
  var text = ta.value.trim()
  if (!text || STATE.thinking) return
  ta.value = ''; ta.style.height = ''
  document.getElementById('sendBtn').disabled = true
  doSend(text)
}

function quickSend(el) { if (!STATE.thinking) doSend(el.textContent) }

function buildSystemPrompt(p) {
  if (!p || !p.nickname) return '你是 TennisF AI 网球教练，请用中文简洁专业地回答网球问题。'
  var levelMap = { beginner: '新手（2.0-2.5 NTRP）', intermediate: '进阶（3.0-3.5 NTRP）', advanced: '竞技（4.0+ NTRP）' }
  return '你是 TennisF AI 网球成长教练，正在为以下球员提供一对一指导：\n\n' +
    '球员档案\n' +
    '- 昵称：' + p.nickname + '\n' +
    '- 水平：' + (levelMap[p.level] || p.ntrpLevel || '未知') + '\n' +
    '- 风格：' + (p.playStyle || '未填写') + '\n' +
    '- 强项：' + ((p.strengths || []).join('、') || '未填写') + '\n' +
    '- 需提升：' + ((p.weaknesses || []).join('、') || '未填写') + '\n' +
    '- 目标：' + ((p.goals || []).join('、') || '未填写') + '\n' +
    '- 伤病：' + ((p.injuries || []).join('、') || '无') + '\n\n' +
    '请根据该球员档案给出针对性建议，语言简洁，多用具体动作描述，回答控制在 200 字以内（除非用户要求详细）。'
}

function doSend(text) {
  STATE.thinking = true
  addMsg('user', text)
  addTyping()
  document.getElementById('quickWrap').style.display = 'none'

  var messages = [{ role: 'system', content: buildSystemPrompt(STATE.player) }]
  var hist = STATE.history.slice(-8)
  for (var i = 0; i < hist.length; i++) messages.push(hist[i])
  messages.push({ role: 'user', content: text })

  var controller = new AbortController()
  var timer = setTimeout(function() { controller.abort() }, 30000)

  fetch(COACH_API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages: messages }),
    signal: controller.signal
  })
  .then(function(r) { clearTimeout(timer); return r.json() })
  .then(function(data) {
    removeTyping(); STATE.thinking = false
    var reply = data.reply
    addMsg('ai', reply || '暂时无法回复，请稍后再试。')
    if (reply) {
      STATE.history.push({ role:'user', content:text })
      STATE.history.push({ role:'assistant', content:reply })
      if (STATE.history.length > 20) STATE.history = STATE.history.slice(-20)
    }
  })
  .catch(function(e) {
    clearTimeout(timer)
    removeTyping(); STATE.thinking = false
    addMsg('ai', e && e.name === 'AbortError' ? '请求超时，请重试。' : '网络错误，请重试。')
  })
}

function showErr(title, sub) {
  document.getElementById('errTitle').textContent = title
  document.getElementById('errSub').textContent = sub
  document.getElementById('screenErr').classList.remove('hidden')
}

function avColor(n) { return AV_COLORS[n.charCodeAt(n.length - 1) % AV_COLORS.length] }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;') }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px' }
function onEnter(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg() } }
</script>
</body>
</html>
