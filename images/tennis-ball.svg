<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <radialGradient id="ball" cx="38%" cy="36%" r="64%">
      <stop offset="0%"   stop-color="#DEFF5A"/>
      <stop offset="45%"  stop-color="#C8E616"/>
      <stop offset="100%" stop-color="#8BA300"/>
    </radialGradient>
    <radialGradient id="shade" cx="62%" cy="64%" r="55%">
      <stop offset="0%"   stop-color="rgba(0,0,0,0.28)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <clipPath id="c">
      <circle cx="60" cy="60" r="56"/>
    </clipPath>
  </defs>
  <!-- Base ball -->
  <circle cx="60" cy="60" r="56" fill="url(#ball)"/>
  <!-- Shadow overlay for depth -->
  <circle cx="60" cy="60" r="56" fill="url(#shade)"/>
  <!-- Seam top -->
  <path d="M8 46 Q36 18 60 46 Q84 74 112 46"
        fill="none" stroke="white" stroke-width="5.5"
        stroke-linecap="round" opacity="0.82"
        clip-path="url(#c)"/>
  <!-- Seam bottom -->
  <path d="M8 74 Q36 102 60 74 Q84 46 112 74"
        fill="none" stroke="white" stroke-width="5.5"
        stroke-linecap="round" opacity="0.82"
        clip-path="url(#c)"/>
  <!-- Specular highlight -->
  <ellipse cx="44" cy="40" rx="15" ry="9" fill="white" opacity="0.14"/>
</svg>
